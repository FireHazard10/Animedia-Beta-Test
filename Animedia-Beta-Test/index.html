<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AniMedia | The Future of Animation</title>
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&family=Plus+Jakarta+Sans:wght@300;400;700&display=swap"
      rel="stylesheet"
    />
    <!-- Font Awesome for Icons -->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
    />
    <!-- GSAP for Animations -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/ScrollTrigger.min.js"></script>
    <style>
      :root {
        --primary: #ff8a65;
        --primary-light: #ffc371;
        --secondary: #6366f1;
        --accent: #f43f5e;
        --bg-dark: #0f172a;
        --glass-bg: rgba(255, 255, 255, 0.05);
        --glass-border: rgba(255, 255, 255, 0.1);
        --text-main: #f8fafc;
        --text-muted: #94a3b8;
      }

      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        font-family: "Plus Jakarta Sans", sans-serif;
        background-color: var(--bg-dark);
        color: var(--text-main);
        overflow-x: hidden;
        /* min-height: 100vh;*/
      }

      /* Custom Scrollbar */
      ::-webkit-scrollbar {
        width: 8px;
      }
      ::-webkit-scrollbar-track {
        background: var(--bg-dark);
      }
      ::-webkit-scrollbar-thumb {
        background: var(--glass-border);
        border-radius: 10px;
      }
      ::-webkit-scrollbar-thumb:hover {
        background: var(--primary);
      }

      /* Background Layer */
      .bg-container {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        z-index: -1;
        overflow: hidden;
      }

      .bg-image {
        width: 100%;
        height: 100%;
        object-fit: cover;
        filter: brightness(0.4) saturate(1.2);
        transform: scale(1.1);
        transition: transform 0.5s ease-out;
      }

      .bg-overlay {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: radial-gradient(
          circle at center,
          transparent 0%,
          var(--bg-dark) 100%
        );
      }

      /* Navigation */
      nav {
        position: fixed;
        top: 0;
        width: 100%;
        padding: 1rem 2.5%;
        display: flex;
        justify-content: space-between;
        align-items: center;
        z-index: 100;
        transition: all 0.3s ease;
      }

      nav.scrolled {
        padding: 1rem 5%;
        background: rgba(15, 23, 42, 0.8);
        backdrop-filter: blur(10px);
        border-bottom: 1px solid var(--glass-border);
      }

      .logo {
        font-family: "Outfit", sans-serif;
        font-size: 1.8rem;
        font-weight: 800;

        text-decoration: none;
        color: #fff;
        display: flex;
        align-items: center;
      }

      .logo i {
        color: var(--primary);
        font-size: 1.5rem;
      }

      .logo span {
        background: linear-gradient(
          to right,
          var(--primary),
          var(--primary-light)
        );
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
      }

      .nav-links {
        display: flex;
        gap: 2rem;
        align-items: center;
      }

      .nav-links a {
        text-decoration: none;
        color: var(--text-main);
        font-weight: 600;
        font-size: 0.9rem;
        transition: color 0.3s ease;
        opacity: 0.8;
      }

      .nav-links a:hover {
        color: var(--primary);
        opacity: 1;
      }

      .btn-glass {
        background: var(--glass-bg);
        border: 1px solid var(--glass-border);
        backdrop-filter: blur(5px);
        padding: 0.6rem 1.5rem;
        border-radius: 50px;
        color: #fff;
        text-decoration: none;
        font-weight: 600;
        font-size: 0.9rem;
        transition: all 0.3s ease;
      }

      .btn-glass:hover {
        background: rgba(255, 255, 255, 0.1);
        border-color: var(--primary);
        transform: translateY(-2px);
      }

      /* Hero Section */
      .hero {
        height: 100vh;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        text-align: center;
        padding: 0 10%;
        position: relative;
      }

      .hero-content {
        max-width: 900px;
        z-index: 1;
      }

      .badge {
        display: inline-block;
        padding: 0.5rem 1.2rem;
        background: rgba(255, 138, 101, 0.1);
        border: 1px solid rgba(255, 138, 101, 0.3);
        border-radius: 100px;
        color: var(--primary);
        font-size: 0.8rem;
        font-weight: 700;
        text-transform: uppercase;
        letter-spacing: 2px;
        margin-bottom: 2rem;
        opacity: 0;
        transform: translateY(20px);
      }

      .hero h1 {
        font-family: "Outfit", sans-serif;
        font-size: clamp(3rem, 8vw, 6rem);
        font-weight: 800;
        line-height: 1;
        margin-bottom: 1.5rem;
        letter-spacing: -2px;
        opacity: 0;
        transform: translateY(30px);
      }

      .hero h1 span {
        display: block;
        background: linear-gradient(135deg, #fff 0%, #94a3b8 100%);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
      }

      .hero h1 .highlight {
        background: linear-gradient(
          135deg,
          var(--primary) 0%,
          var(--primary-light) 100%
        );
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
      }

      .hero p {
        font-size: 1.2rem;
        color: var(--text-muted);
        max-width: 600px;
        margin: 0 auto 3rem;
        line-height: 1.6;
        opacity: 0;
        transform: translateY(30px);
      }

      .hero-btns {
        display: flex;
        gap: 1.5rem;
        justify-content: center;
        opacity: 0;
        transform: translateY(30px);
      }

      .btn-primary {
        background: linear-gradient(
          135deg,
          var(--primary),
          var(--primary-light)
        );
        color: #fff;
        padding: 1.2rem 2.5rem;
        border-radius: 16px;
        text-decoration: none;
        font-weight: 700;
        font-size: 1.1rem;
        box-shadow: 0 10px 30px rgba(255, 138, 101, 0.3);
        transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        display: flex;
        align-items: center;
        gap: 10px;
      }

      .btn-primary:hover {
        transform: translateY(-5px) scale(1.02);
        box-shadow: 0 15px 40px rgba(255, 138, 101, 0.4);
      }

      .btn-secondary {
        background: var(--glass-bg);
        border: 1px solid var(--glass-border);
        backdrop-filter: blur(10px);
        color: #fff;
        padding: 1.2rem 2.5rem;
        border-radius: 16px;
        text-decoration: none;
        font-weight: 700;
        font-size: 1.1rem;
        transition: all 0.3s ease;
        display: flex;
        align-items: center;
        gap: 10px;
      }

      .btn-secondary:hover {
        background: rgba(255, 255, 255, 0.1);
        border-color: rgba(255, 255, 255, 0.3);
        transform: translateY(-5px);
      }

      /* Floating Info Card */
      .info-card {
        position: absolute;
        bottom: 50px;
        left: 5%;
        background: rgba(15, 23, 42, 0.6);
        backdrop-filter: blur(15px);
        border: 1px solid var(--glass-border);
        padding: 1.5rem;
        border-radius: 20px;
        display: flex;
        align-items: center;
        gap: 1rem;
        max-width: 300px;
        opacity: 0;
        transform: translateX(-30px);
      }

      .info-card .icon-box {
        width: 50px;
        height: 50px;
        background: var(--primary);
        border-radius: 12px;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 1.5rem;
      }

      .info-card h4 {
        font-size: 0.9rem;
        margin-bottom: 0.2rem;
      }

      .info-card p {
        font-size: 0.75rem;
        color: var(--text-muted);
        margin: 0;
      }

      /* Scroll Indicator */
      .scroll-down {
        position: absolute;
        bottom: 30px;
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 10px;
        color: var(--text-muted);
        font-size: 0.8rem;
        font-weight: 600;
        text-transform: uppercase;
        letter-spacing: 2px;
        opacity: 0;
      }

      .mouse {
        width: 26px;
        height: 42px;
        border: 2px solid var(--glass-border);
        border-radius: 20px;
        position: relative;
      }

      .mouse::after {
        content: "";
        width: 4px;
        height: 8px;
        background: var(--primary);
        position: absolute;
        top: 8px;
        left: 50%;
        transform: translateX(-50%);
        border-radius: 2px;
        animation: scroll 2s infinite;
      }

      @keyframes scroll {
        0% {
          transform: translateX(-50%) translateY(0);
          opacity: 1;
        }
        100% {
          transform: translateX(-50%) translateY(15px);
          opacity: 0;
        }
      }

      /* Responsive Fixes */
      @media (max-width: 768px) {
        .nav-links {
          display: none;
        }
        .hero h1 {
          font-size: 3.5rem;
        }
        .hero-btns {
          flex-direction: column;
          width: 100%;
          max-width: 300px;
        }
        .info-card {
          display: none;
        }
      }

      /* Custom Cursor */
      .cursor {
        width: 40px;
        height: 40px;
        border: 2px solid var(--primary);
        border-radius: 50%;
        position: fixed;
        pointer-events: none;
        z-index: 9999;
        transition:
          transform 0.1s ease,
          background 0.3s ease;
        transform: translate(-50%, -50%);
        display: none;
      }

      @media (pointer: fine) {
        .cursor {
          display: block;
        }
      }
    </style>
  </head>
  <body>
    <div class="cursor"></div>

    <div class="bg-container">
      <img src="assets/hero_bg.jpg" alt="Background" class="bg-image" />
      <div class="bg-overlay"></div>
    </div>

    <nav id="navbar">
      <a href="#" class="logo"> Ani<span>Media</span> </a>
      <div class="nav-links">
        <a href="#">Gallery</a>
        <a href="#">Behind Scenes</a>
        <a href="#">Community</a>
        <a href="#" class="btn-glass">Sign In</a>
      </div>
    </nav>

    <section class="hero">
      <div class="hero-content">
        <!--<div class="badge">Next-Gen Animation Hub</div>-->
        <h1>
          <span>Experience the Art of</span>
          <span class="highlight">Motion & Story</span>
        </h1>
        <p>
          Dive into a colorful world of animation curated shorts,
          behind-the-scenes features, and playful recommendations.
        </p>
        <div class="hero-btns">
          <a href="home-page.html" class="btn-primary">
            Start Exploring <i class="fas fa-arrow-right"></i>
          </a>
          <a href="#" class="btn-secondary">
            Watch Trailer <i class="fas fa-play"></i>
          </a>
        </div>
      </div>

      <div class="info-card">
        <div class="icon-box">
          <i class="fas fa-lightbulb"></i>
        </div>
        <div>
          <h4>Pro Tip</h4>
          <p>Sign up to save favorites and create custom playlists.</p>
        </div>
      </div>

      <!-- <div class="scroll-down">
        <div class="mouse"></div>
        <span>Scroll</span>
      </div>-->
    </section>

    <script>
      // Custom Cursor
      const cursor = document.querySelector(".cursor");
      document.addEventListener("mousemove", (e) => {
        cursor.style.left = e.clientX + "px";
        cursor.style.top = e.clientY + "px";
      });

      document.addEventListener("mousedown", () => {
        cursor.style.transform = "translate(-50%, -50%) scale(0.8)";
        cursor.style.background = "rgba(255, 138, 101, 0.2)";
      });

      document.addEventListener("mouseup", () => {
        cursor.style.transform = "translate(-50%, -50%) scale(1)";
        cursor.style.background = "transparent";
      });

      // Hover effect for links
      const links = document.querySelectorAll("a, button");
      links.forEach((link) => {
        link.addEventListener("mouseenter", () => {
          cursor.style.transform = "translate(-50%, -50%) scale(1.5)";
          cursor.style.borderColor = "rgba(255, 138, 101, 0.5)";
        });
        link.addEventListener("mouseleave", () => {
          cursor.style.transform = "translate(-50%, -50%) scale(1)";
          cursor.style.borderColor = "var(--primary)";
        });
      });

      // Navbar Scroll Effect
      window.addEventListener("scroll", () => {
        const nav = document.getElementById("navbar");
        if (window.scrollY > 50) {
          nav.classList.add("scrolled");
        } else {
          nav.classList.remove("scrolled");
        }
      });

      // GSAP Animations
      window.onload = () => {
        const tl = gsap.timeline({
          defaults: { ease: "power4.out", duration: 1.2 },
        });

        tl.to(".badge", { opacity: 1, y: 0, delay: 0.5 })
          .to(".hero h1", { opacity: 1, y: 0 }, "-=0.8")
          .to(".hero p", { opacity: 1, y: 0 }, "-=1")
          .to(".hero-btns", { opacity: 1, y: 0 }, "-=1")
          .to(".info-card", { opacity: 1, x: 0 }, "-=0.5")
          .to(".scroll-down", { opacity: 1 }, "-=0.5");

        // Parallax effect for background
        document.addEventListener("mousemove", (e) => {
          const x = (window.innerWidth / 2 - e.clientX) / 50;
          const y = (window.innerHeight / 2 - e.clientY) / 50;
          gsap.to(".bg-image", {
            x: x,
            y: y,
            duration: 1,
            ease: "power2.out",
          });
        });
      };
    </script>
  </body>
</html>

<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AniMedia - Immersive Experience</title>
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&family=Plus+Jakarta+Sans:wght@300;400;500;700&display=swap"
      rel="stylesheet"
    />
    <!-- Font Awesome for Icons -->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
    />
    <!-- GSAP for Animations -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/ScrollTrigger.min.js"></script>
    <style>
      :root {
        --primary: #ff8a65;
        --primary-light: #ffc371;
        --secondary: #6366f1;
        --accent: #f43f5e;
        --bg-dark: #0f172a;
        --bg-black: #050505;
        --glass-bg: rgba(255, 255, 255, 0.05);
        --glass-border: rgba(255, 255, 255, 0.1);
        --text-main: #f8fafc;
        --text-muted: #94a3b8;
        --card-bg: rgba(255, 255, 255, 0.03);
        --transition-smooth: all 0.5s cubic-bezier(0.4, 0, 0.2, 1);
      }

      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        font-family: "Plus Jakarta Sans", sans-serif;
        background: #050505; /* Deeper black for premium feel */
        color: #fff;
        overflow-x: hidden;
      }

      header {
        position: absolute; /* Allows content to sit underneath */
        /*top: 0;
           left: 0;*/
        width: 100%;
        z-index: 100;
        background: linear-gradient(
          to bottom,
          rgba(0, 0, 0, 0.8) 0%,
          transparent 100%
        );
        transition: background 0.3s ease;
      }

      .xeno {
        /*max-width: 1200px;*/
        margin: 0 auto;
        padding: 1.5rem;
        display: flex;
        justify-content: space-between;
        align-items: center;
        flex-wrap: wrap;
      }

      .logo {
        font-family: "Outfit", sans-serif;
        font-size: 1.8rem;
        font-weight: 800;

        text-decoration: none;
        color: #fff;
        display: flex;
        align-items: center;
      }

      .logo span {
        background: linear-gradient(
          to right,
          var(--primary),
          var(--primary-light)
        );
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
      }

      nav {
        display: flex;
        gap: 1.5rem;
        font-weight: 600;
      }

      nav a {
        color: rgba(255, 255, 255, 0.9);
        text-decoration: none;
        transition: color 0.3s ease;
        position: relative;
      }
      nav a::after {
        content: "";
        position: absolute;
        width: 0%;
        height: 2px;
        left: 0;
        bottom: -4px;
        background: #ff8a65;
        transition: width 0.3s ease;
      }

      nav a:hover {
        color: #ff8a65;
      }

      nav a:hover::after {
        width: 100%;
      }

      .cta {
        background: linear-gradient(
          135deg,
          var(--primary),
          var(--primary-light)
        );
        color: #fff;
        border: none;
        padding: 0.5rem 1rem;
        border-radius: 10px;
        font-weight: 600;
        text-decoration: none;
        transition: background 0.3s;
      }

      .cta:hover {
        transform: translateY(-5px) scale(1.02);
        box-shadow: 0 15px 40px rgba(255, 138, 101, 0.4);
      }

      .hamburger {
        display: none;
        background: none;
        border: none;
        color: white;
        font-size: 1.5rem;
        cursor: pointer;
      }

      .mobile-menu {
        display: none;
        flex-direction: column;
        gap: 1rem;
        padding: 1rem 1.5rem;
        background: rgba(0, 0, 0, 0.2);
      }

      .mobile-menu.active {
        display: flex;
      }

      .mobile-menu a {
        color: rgba(255, 255, 255, 0.9);
        text-decoration: none;
        padding: 0.5rem 0;
      }

      .hero {
        text-align: center;
        padding: 5rem 1rem;
        position: relative;
        z-index: 1;
      }

      .hero h1 {
        color: var(--text);
        font-size: 2.5rem;
        font-weight: 800;
        text-shadow: 0 2px 10px rgba(0, 0, 0, 0.8);
      }

      .hero p {
        margin-top: 1rem;
        max-width: 600px;
        margin-left: auto;
        margin-right: auto;
        font-size: 1.2rem;
        color: rgba(255, 255, 255, 0.8);
      }

      .hero a {
        display: inline-block;
        margin-top: 2rem;
        background: #db2777;
        padding: 0.75rem 2rem;
        border-radius: 999px;
        font-weight: 600;
        color: white;
        text-decoration: none;
        transition: background 0.3s;
      }

      .hero a:hover {
        background: #be185d;
      }

      /* Custom Scrollbar */
      ::-webkit-scrollbar {
        width: 6px;
      }
      ::-webkit-scrollbar-track {
        background: var(--bg-dark);
      }
      ::-webkit-scrollbar-thumb {
        background: var(--glass-border);
        border-radius: 10px;
      }
      ::-webkit-scrollbar-thumb:hover {
        background: var(--primary);
      }

      /* ---------- Background Layer ---------- */
      .bg-container {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        z-index: -1;
        overflow: hidden;
      }

      .bg-image {
        width: 100%;
        height: 100%;
        object-fit: cover;
        filter: brightness(0.15) saturate(1.2) blur(30px);
        /*transform: scale(1.15);
             transition: transform 1.5s ease-out;*/
      }

      .bg-overlay {
        position: absolute;
        inset: 0;
        background: radial-gradient(
          circle at center,
          transparent 0%,
          var(--bg-black) 100%
        );
      }

      .container {
        max-width: 1300px;
        margin: 0 auto;
        padding: 1.5rem 2rem;
        display: flex;
        justify-content: space-between;
        align-items: center;
      }

      /* ---------- Hero Section ---------- */
      .movie-xero {
        position: relative;
        width: 100%;
        height: 80vh; /* Taller hero */
      }

      .xero-img {
        width: 100%;
        height: 100%;
        object-fit: cover;
      }

      .xero-overlay {
        position: absolute;
        inset: 0;
        /* Darken bottom for smooth transition to content */
        background: linear-gradient(to top, #050505 0%, transparent 50%);
      }

      /* ---------- Details Section ---------- */
      .movie-description {
        position: relative;
        padding: 0 2rem 4rem 2rem;
        margin-top: -150px; /* This pulls the section UP into the image */
        z-index: 10;
      }

      .movie-card {
        display: flex;
        gap: 40px;
        max-width: 1100px;
        margin: 0 auto;
      }

      /* The Connecting Poster */
      .poster-wrap {
        flex-shrink: 0;
        transform: translateY(-50px); /* Lifts poster even higher */
      }

      .poster-wrap img {
        width: 260px;
        height: 380px;
        object-fit: cover;
        border-radius: 12px;
        border: 4px solid rgba(255, 255, 255, 0.1);
        box-shadow: 0 30px 60px rgba(0, 0, 0, 0.8);
      }

      /* .poster-wrap:hover img {
             transform: translateY(-10px) rotateY(5deg);
             box-shadow: 0 60px 120px rgba(255, 138, 101, 0.2);
           }*/

      /* Info Section */
      .movie-info {
        margin-top: 60px; /* Aligns text with the bottom of the overlap */
      }

      .movie-title {
        font-size: 3.5rem;
        font-weight: 800;
        margin-bottom: 0.5rem;
        letter-spacing: -1px;
      }

      .meta {
        display: flex;
        gap: 15px;
        align-items: center;
        color: #bbb;
        margin-bottom: 2rem;
      }

      .rating {
        border: 1px solid #ff8a65;
        color: #ff8a65;
        padding: 2px 8px;
        border-radius: 4px;
        font-size: 0.7rem;
        font-weight: bold;
      }

      .synopsis {
        text-align: justify;
        font-size: 1.1rem;
        line-height: 1.8;
        color: rgba(255, 255, 255, 0.8);
        margin-bottom: 2.5rem;
        max-width: 700px;
      }

      .actions {
        display: flex;
        gap: 20px;
      }

      .watch-me {
        background: var(--primary);
        color: #fff;
        border: none;
        padding: 16px 40px;
        font-weight: 800;
        border-radius: 12px;
        cursor: pointer;
        font-size: 1rem;
        display: flex;
        align-items: center;
        gap: 10px;
        transition: var(--transition-smooth);
        box-shadow: 0 10px 30px rgba(255, 138, 101, 0.3);
      }

      .watch-me:hover {
        background: #fff;
        -webkit-text-fill-color: #000 !important;
        color: #000 !important;
        transform: translateY(-5px);
        box-shadow: 0 15px 40px rgba(255, 255, 255, 0.2);
      }

      .watch-me a {
        display: flex;
        text-decoration: none;
        align-items: center;
        color: #fff;
        font-weight: 800;
        cursor: pointer;
        font-size: 1rem;
        gap: 10px;
      }

      .watch-me a:hover {
        color: #000;
      }

      .add-btn {
        background: rgba(255, 255, 255, 0.05);
        backdrop-filter: blur(10px);
        border: 1px solid rgba(255, 255, 255, 0.1);
        color: #fff;
        padding: 16px 32px;
        border-radius: 12px;
        cursor: pointer;
        font-weight: 700;
        transition: var(--transition-smooth);
      }

      .add-btn:hover {
        background: rgba(255, 255, 255, 0.15);
        border-color: rgba(255, 255, 255, 0.3);
      }

      /* ---------- Content Grid ---------- */
      .movie-extra {
        max-width: 1200px;
        margin: 0 auto 6rem auto;
        padding: 3rem;
        background: rgba(255, 255, 255, 0.02);
        border-radius: 30px;
        border: 1px solid rgba(255, 255, 255, 0.05);
        backdrop-filter: blur(20px);
      }

      .section-label {
        margin-bottom: 3rem;
        font-size: 2rem;
        font-weight: 800;
        display: flex;
        align-items: center;
        gap: 15px;
      }

      .section-label::before {
        content: "";
        width: 5px;
        height: 35px;
        background: var(--primary);
        border-radius: 10px;
      }

      .cards {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
        gap: 30px;
      }

      .card {
        position: relative;
        height: 200px;
        border-radius: 20px;
        overflow: hidden;
        cursor: pointer;
        transition: var(--transition-smooth);
        border: 1px solid rgba(255, 255, 255, 0.05);
      }

      .card img {
        width: 100%;
        height: 100%;
        object-fit: cover;
        transition: transform 0.8s cubic-bezier(0.4, 0, 0.2, 1);
      }

      .card:hover img {
        transform: scale(1.1);
      }

      .overlay {
        position: absolute;
        inset: 0;
        background: linear-gradient(
          to top,
          rgba(0, 0, 0, 0.9) 0%,
          transparent 100%
        );
        display: flex;
        flex-direction: column;
        justify-content: flex-end;
        padding: 25px;
        opacity: 0.9;
        transition: var(--transition-smooth);
      }

      .overlay h3 {
        font-size: 1.2rem;
        margin-bottom: 12px;
        font-weight: 700;
      }

      .overlay button {
        background: var(--primary);
        color: #fff;
        border: none;
        padding: 10px 20px;
        border-radius: 8px;
        font-weight: 700;
        font-size: 0.9rem;
        width: fit-content;
        transform: translateY(10px);
        opacity: 0;
        transition: var(--transition-smooth);
      }

      .card:hover .overlay button {
        transform: translateY(0);
        opacity: 1;
      }

      /* ---------- Loader ---------- */
      .loader-container {
        position: fixed;
        inset: 0;
        background: var(--bg-black);
        display: flex;
        justify-content: center;
        align-items: center;
        z-index: 9999;
      }

      .loader-icon {
        font-size: 3rem;
        color: var(--primary);
        animation: spin 1s linear infinite;
      }

      @keyframes spin {
        100% {
          transform: rotate(360deg);
        }
      }

      /* ---------- Footer ---------- */
      footer {
        background: transparent;

        padding: 40px 20px;
        text-align: center;
      }

      .end {
        font-size: 2rem;
        margin-bottom: 10px;
        background: linear-gradient(135deg, #ffc371, #ff8a65);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
      }

      .end span {
        background: none !important;
        -webkit-background-clip: unset !important;
        -webkit-text-fill-color: #fff !important;
        color: #fff !important;
      }

      footer hr {
        border: none;
        border-top: 1px solid #ffffff;
        margin: 10px auto 20px;
        width: 80%;
      }

      .footer-links {
        display: flex;
        flex-wrap: wrap;
        justify-content: center;
        gap: 20px;
        font-size: 0.95rem;
        background: none !important; /* remove inherited background */
        -webkit-background-clip: unset !important;
        -webkit-text-fill-color: #ffffff !important; /* force solid white text */
        color: #ccc !important;
      }

      .footer-links p {
        margin: 5px 0;
      }

      .footer-links p:hover {
        cursor: pointer;
        color: #fff !important;
      }

      /* ---------- Mobile Responsive ---------- */
      @media (max-width: 1024px) {
        .movie-card {
          flex-direction: column;
          align-items: center;
          text-align: center;
          gap: 40px;
        }
        .movie-title {
          font-size: 3rem;
        }
        .movie-info {
          margin-top: 0;
        }
        .synopsis {
          margin-inline: auto;
        }
        .actions {
          justify-content: center;
        }
        .movie-description {
          margin-top: -100px;
        }
      }

      @media (max-width: 768px) {
        nav,
        .cta {
          display: none;
        }

        .hamburger {
          display: block;
        }

        .mobile-menu .join {
          background: linear-gradient(135deg, #ffc371, #ff8a65);
          color: #fff;
          border: none;
          padding: 0.5rem 1rem;
          border-radius: 10px;
          font-weight: 600;
          text-decoration: none;
          display: flex;
          justify-content: center;
          width: 100%;
        }

        .mobile-menu.active {
          display: flex;
        }
      }
    </style>
  </head>
  <body>
    <!-- Loader -->
    <div id="pageLoader" class="loader-container">
      <div class="loader-icon"><i class="fas fa-circle-notch"></i></div>
    </div>

    <header id="mainHeader">
      <div class="xeno">
        <div class="logo">Ani<span>Media</span></div>

        <nav>
          <a href="home-page.html">Home</a>
          <a href="series.html">Series</a>
          <a href="A1-explore.html">Movies</a>
          <a href="genre.html">Genres</a>
        </nav>

        <a href="Aimiddle-page.html" class="cta">Join Now</a>

        <button class="hamburger" onclick="toggleMobileMenu()">☰</button>
      </div>

      <div class="mobile-menu" id="mobileMenu">
        <a href="home-page.html">Home</a>
        <a href="series.html">Series</a>
        <a href="A1-explore.html">Movies</a>
        <a href="genre.html">Genres</a>
        <a href="#" class="cta" style="width: fit-content">Join Now</a>
      </div>
    </header>

    <div class="bg-container">
      <img id="bgImage" src="" alt="Background" class="bg-image" />
      <div class="bg-overlay"></div>
    </div>

    <main id="detailsContent">
      <!-- Content injected by JS -->
    </main>

    <footer>
      <div class="end">
        Ani<span>Media</span>
        <hr />
        <div class="footer-links">
          <p>All rights reserved</p>
          <p>animedia@gmail.com</p>
          <p>Terms and Conditions</p>
          <p>Registered 2025</p>
          <p>&copy; AniMedia</p>
        </div>
      </div>
    </footer>

    <script src="home-page.js"></script>

    <script>
      const API_BASE = "https://api.jikan.moe/v4";
      const urlParams = new URLSearchParams(window.location.search);
      const animeId = urlParams.get("id") || "52991"; // Default for demo if no ID

      // Scroll Effect
      window.addEventListener("scroll", () => {
        const header = document.getElementById("mainHeader");
        if (window.scrollY > 50) header.classList.add("scrolled");
        else header.classList.remove("scrolled");
      });

      async function fetchDetails() {
        try {
          const [animeRes, episodesRes, relationsRes] = await Promise.all([
            fetch(`${API_BASE}/anime/${animeId}/full`),
            fetch(`${API_BASE}/anime/${animeId}/episodes`),
            fetch(`${API_BASE}/anime/${animeId}/relations`),
          ]);

          const animeData = await animeRes.json();
          const episodesData = await episodesRes.json();
          const relationsData = await relationsRes.json();

          renderDetails(animeData.data, episodesData.data, relationsData.data);
        } catch (error) {
          console.error("Error:", error);
          document.getElementById("detailsContent").innerHTML =
            '<div style="padding: 100px; text-align: center;">Failed to load details. Please try again.</div>';
          gsap.to("#pageLoader", { opacity: 0, pointerEvents: "none" });
        }
      }

      function renderDetails(anime, episodes, relations) {
        const container = document.getElementById("detailsContent");
        const bgImg = document.getElementById("bgImage");

        bgImg.src = anime.images.webp.large_image_url;

        const episodesHtml =
          episodes && episodes.length > 0
            ? episodes
                .slice(0, 6)
                .map(
                  (ep) => `
            <div class="card">
              <img src="${anime.images.webp.large_image_url}" alt="Episode">
              <div class="overlay">
                <h3>Episode ${ep.mal_id}: ${ep.title || "TBA"}</h3>
                <button onclick="getVideoFile(${anime.mal_id})">Play Now</button>
              </div>
            </div>
          `,
                )
                .join("")
            : '<p style="color: var(--text-muted)">No episodes available yet.</p>';

        container.innerHTML = `
          <section class="movie-xero">
            <img src="${anime.images.webp.large_image_url}" alt="Backdrop" class="xero-img" id="heroImg" />
            <div class="xero-overlay"></div>
          </section>

          <section class="movie-description">
            <div class="movie-card">
              <div class="poster-wrap" id="mainPoster">
                <img src="${anime.images.webp.large_image_url}" alt="Poster" />
              </div>

              <div class="movie-info" id="mainInfo">
                <h1 class="movie-title">${anime.title}</h1>

                <div class="meta">
                  <span class="rating">${anime.rating ? anime.rating.split(" ")[0] : "TV"}</span>
                  <span>${anime.year || anime.aired.from.split("-")[0]}</span>
                  <span>${anime.duration}</span>
                  <span>${anime.genres
                    .map((g) => g.name)
                    .slice(0, 2)
                    .join(" / ")}</span>
                </div>

                <p class="synopsis">${anime.synopsis || "No description available."}</p>

                <div class="actions">
                  <button class="watch-me" onclick="getVideoFile(${anime.mal_id})">
                    <a href="player.html"><i class="fas fa-play"></i> Watch Now</a>
                  </button>
                  <button class="add-btn">
                    <i class="fas fa-plus"></i> Add to List
                  </button>
                </div>
              </div>
            </div>
          </section>

          <section class="movie-extra">
            <h2 class="section-label">Latest Episodes</h2>
            <div class="cards">
              ${episodesHtml}
            </div>
          </section>
        `;

        // Tier 1 Animations
        const tl = gsap.timeline();

        tl.to("#pageLoader", {
          opacity: 0,
          duration: 0.8,
          ease: "power2.inOut",
          onComplete: () => {
            document.getElementById("pageLoader").style.display = "none";
          },
        })
          .from(
            "#heroImg",
            { scale: 1.2, duration: 2, ease: "power2.out" },
            "-=0.5",
          )
          .from(
            "#mainPoster",
            { y: 100, opacity: 0, duration: 1.2, ease: "expo.out" },
            "-=1.5",
          )
          .to(
            "#mainInfo",
            { y: 0, opacity: 1, duration: 1.2, ease: "expo.out" },
            "-=1",
          )
          .from(
            ".movie-extra",
            { y: 50, opacity: 0, duration: 1, ease: "power3.out" },
            "-=0.8",
          );

        // Parallax Effect for Background
        // window.addEventListener("scroll", () => {
        //  const scrolled = window.scrollY;
        //  gsap.to("#heroImg", { y: scrolled * 0.4, overwrite: true });
        // gsap.to("#bgImage", {
        //  scale: 1.15 + scrolled * 0.0002,
        //  overwrite: true,
        // });
        //});
      }

      async function getVideoFile(id) {
        try {
          const res = await fetch(`${API_BASE}/anime/${id}/videos`);
          const data = await res.json();
          if (data.data && data.data.promo && data.data.promo.length > 0) {
            window.open(data.data.promo[0].video.url, "_blank");
          } else {
            alert("No direct video file found. Opening MAL page...");
            window.open(`https://myanimelist.net/anime/${id}`, "_blank");
          }
        } catch (e) {
          alert("Error retrieving video data.");
        }
      }

      window.onload = fetchDetails;
    </script>
  </body>
</html>
